<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood to Music</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
      background: #fafafa;
    }

    input[type="text"]:focus {
      border-color: #6c63ff;
      background: #fff;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      background-color: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #574fd6;
    }

    button:disabled {
      background-color: #b0aae8;
      cursor: not-allowed;
    }

    .status {
      margin-top: 24px;
      font-size: 14px;
      text-align: center;
      color: #777;
    }

    .error {
      margin-top: 24px;
      padding: 12px 16px;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      color: #c0392b;
      font-size: 14px;
    }

    .result-card {
      margin-top: 24px;
      padding: 20px;
      background: #f9f8ff;
      border: 1px solid #e0ddff;
      border-radius: 10px;
    }

    .result-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #444;
      margin-bottom: 14px;
      border-bottom: 1px solid #e0ddff;
      padding-bottom: 10px;
    }

    .result-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .result-item span.field-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-item span.field-value {
      font-size: 15px;
      color: #1a1a1a;
      font-weight: 500;
    }

    .result-item a {
      font-size: 15px;
      color: #6c63ff;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎵 Mood to Music</h1>
    <p class="subtitle">Tell us how you feel and get a playlist for your mood</p>

    <label for="moodInput">How are you feeling?</label>
    <input
      type="text"
      id="moodInput"
      placeholder="e.g. I feel sad today..."
    />

    <button id="getMusicBtn" onclick="getMusic()">Get Music</button>

    <p class="status hidden" id="loadingMsg">Loading...</p>

    <div class="error hidden" id="errorMsg"></div>

    <div class="result-card hidden" id="resultCard">
      <h2>Your Playlist</h2>
      <div class="result-row">
        <div class="result-item">
          <span class="field-label">Mood</span>
          <span class="field-value" id="resMood">—</span>
        </div>
        <div class="result-item">
          <span class="field-label">Playlist Name</span>
          <span class="field-value" id="resPlaylistName">—</span>
        </div>
        <div class="result-item">
          <span class="field-label">Playlist Link</span>
          <a id="resPlaylistUrl" href="#" target="_blank">—</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function getMusic() {
      const moodText = document.getElementById("moodInput").value.trim();
      const btn = document.getElementById("getMusicBtn");
      const loadingMsg = document.getElementById("loadingMsg");
      const errorMsg = document.getElementById("errorMsg");
      const resultCard = document.getElementById("resultCard");

      // Clear previous state
      loadingMsg.classList.add("hidden");
      errorMsg.classList.add("hidden");
      resultCard.classList.add("hidden");

      if (!moodText) {
        errorMsg.textContent = "Please enter how you're feeling before clicking Get Music.";
        errorMsg.classList.remove("hidden");
        return;
      }

      // Show loading
      btn.disabled = true;
      loadingMsg.classList.remove("hidden");

      try {
        const response = await fetch("http://localhost:5678/webhook/mood", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ mood_text: moodText })
        });

        if (!response.ok) {
          throw new Error(`Server returned status ${response.status}`);
        }

        const data = await response.json();

        // Populate result card
        document.getElementById("resMood").textContent = data.mood || "—";
        document.getElementById("resPlaylistName").textContent = data.playlist_name || "—";

        const urlEl = document.getElementById("resPlaylistUrl");
        if (data.playlist_url) {
          urlEl.href = data.playlist_url;
          urlEl.textContent = data.playlist_url;
        } else {
          urlEl.href = "#";
          urlEl.textContent = "—";
        }

        resultCard.classList.remove("hidden");

      } catch (err) {
        errorMsg.textContent = "Failed to get music recommendations. Make sure your n8n webhook is running and try again. (" + err.message + ")";
        errorMsg.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        loadingMsg.classList.add("hidden");
      }
    }

    // Allow pressing Enter to submit
    document.getElementById("moodInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") getMusic();
    });
  </script>

</body>
</html>
